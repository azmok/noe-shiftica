name: Deployment Notification

on:
  check_run:
    types: [completed]

jobs:
  notify:
    # Trigger only on the main branch
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Send Email Notification
        # We trigger on any check completion, but filter for Firebase App Hosting status
        # This action catches the completion of the Firebase build/rollout
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: >-
            ${{ github.event.check_run.conclusion == 'success' && '✅ デプロイ成功' || '❌ デプロイ失敗' }} - ${{ github.repository }}
          body: |
            Firebase App Hosting のデプロイが完了しました。

            リポジトリ: ${{ github.repository }}
            ブランチ: ${{ github.ref_name }}
            ステータス: ${{ github.event.check_run.conclusion == 'success' && '成功' || '失敗' }}
            チェック名: ${{ github.event.check_run.name }}
            詳細URL: ${{ github.event.check_run.html_url }}
          to: ${{ secrets.GMAIL_ADDRESS }}
          from: GitHub Actions
