kind: "AppHostingYaml"
apiVersion: "v1"

# Cloud Run の設定（現状のまま）
runConfig:
  minInstances: 0

# 環境変数とシークレットの紐付け
environmentVariables:
  # Secret Manager から読み込むもの（安全）
  - variable: PAYLOAD_SECRET
    secret: PAYLOAD_SECRET
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY

  # 直接値を書いてもいいもの
  - variable: CONTACT_EMAIL
    value: "info@noe-shiftica.com"
  
  # データベース（本番用のURLが決まったらここに書くか Secret に入れる）
  - variable: DATABASE_URL
    value: "postgres://azuma:mysecretpassword@127.0.0.1:5432/myblogdb"