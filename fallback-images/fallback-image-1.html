<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noe Shiftica | Hero Fallback Assets</title>
    <style>
        :root {
            --noe-dark: #0f1115;
            --noe-white: #ffffff;
            --noe-gray: #f4f4f4;
            --noe-accent: #333333;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: var(--font-main);
            background-color: var(--noe-gray);
        }

        /* =============================================
           PATTERN B: NEURAL FLOW (I--noe-darknline SVG)
           認知の流れをシミュレートした、動的な知性
        ============================================= */
        .hero-svg {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--noe-dark);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-svg svg {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.4;
        }

        .neural-path {
            fill: none;
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 0.5;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 15s linear infinite alternate;
        }

        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }

        .hero-svg h1 {
            z-index: 1;
            color: var(--noe-white);
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 200;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .hero-svg .accent-dot {
            fill: #fff;
            opacity: 0.6;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.2;
            }

            50% {
                transform: scale(2);
                opacity: 0.8;
            }
        }
    </style>
</head>

<body>
    <div class="hero-svg">
        <svg viewBox="0 0 1000 400" preserveAspectRatio="xMidYMid slice">
            <path class="neural-path" d="M-100,200 Q250,50 500,200 T1100,200" />
            <path class="neural-path" d="M-100,250 Q250,100 500,250 T1100,250"
                style="animation-duration: 20s; opacity: 0.1;" />
            <path class="neural-path" d="M-100,150 Q250,0 500,150 T1100,150"
                style="animation-duration: 25s; opacity: 0.1;" />

            <circle class="accent-dot" cx="500" cy="200" r="1.5" />
            <circle class="accent-dot" cx="250" cy="125" r="1" style="animation-delay: -1s;" />
            <circle class="accent-dot" cx="750" cy="275" r="1" style="animation-delay: -2s;" />
        </svg>
        <h1>Noe Shiftica</h1>
    </div>

</body>

</html>
