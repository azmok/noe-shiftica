<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noe Shiftica | Primary Accent Neumorphism</title>
    <style>
        :root {
            --bg: #e0e5ec;
            --light-shadow: #ffffff;
            --dark-shadow: #a3b1c6;
            --color-primary: #CCDD00;
            /* あずまの指定色（Primary） */
            --color-secondary: #6B2DA0;
            /* 前回の指定色（Secondary） */
            --text-main: #3d4756;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: var(--font-main);
        }

        .glass-neumorph {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            border-radius: 40px;
            box-shadow: 15px 15px 30px var(--dark-shadow),
                -15px -15px 30px var(--light-shadow);
            text-align: center;
            overflow: hidden;
        }

        .brand-logo {
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -0.03em;
            /* テキストの色を --color-primary に変更 */
            color: var(--color-primary, #CCDD00);
            /* 彫り込みの影と微かなグローを維持 */
            text-shadow:
                2px 2px 3px var(--dark-shadow),
                -1px -1px 2px var(--light-shadow),
                0 0 15px rgba(107, 45, 160, 0.2);
            position: relative;
            z-index: 2;
        }

        .neural-network {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            opacity: 0.4;
            z-index: 1;
        }

        .pulse-path {
            fill: none;
            stroke: var(--color-secondary);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-dasharray: 10, 50;
            animation: pulse-flow 5s linear infinite;
        }

        @keyframes pulse-flow {
            0% {
                stroke-dashoffset: 100;
                opacity: 0.1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                stroke-dashoffset: 0;
                opacity: 0.1;
            }
        }

        .desc {
            margin-top: 2rem;
            font-size: 0.75rem;
            letter-spacing: 0.6em;
            color: var(--text-main);
            font-weight: 300;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }

        .core-indicator {
            width: 40px;
            height: 4px;
            background: var(--color-secondary);
            margin: 2rem auto 0;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(107, 45, 160, 0.5);
        }
    </style>
</head>

<body>

    <div class="glass-neumorph">
        <svg class="neural-network" viewBox="0 0 700 300">
            <path class="pulse-path" d="M0,150 Q175,50 350,150 T700,150" />
            <path class="pulse-path" d="M0,160 Q175,260 350,160 T700,160" style="animation-delay: -2.5s;" />
        </svg>

        <h1 class="brand-logo">Noe Shiftica</h1>
        <div class="core-indicator"></div>
        <p class="desc">Neural Shift Agency</p>
    </div>

</body>

</html>
