<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noe Shiftica | Neumorphic Fallback</title>
    <style>
        :root {
            /* ニューモーフィズムの肝：背景色、明るい影、暗い影の絶妙なバランス */
            --bg: #e0e5ec;
            --light-shadow: #ffffff;
            --dark-shadow: #a3b1c6;
            --accent-text: #444;
            --font-main: 'Inter', -apple-system, sans-serif;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: var(--font-main);
            overflow: hidden;
        }

        /* メインの器：柔らかく浮き上がる */
        .artifact-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: var(--bg);
            border-radius: 50px;
            box-shadow: 20px 20px 60px var(--dark-shadow),
                -20px -20px 60px var(--light-shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 彫り込まれたブランドロゴ */
        .brand-engraved {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            color: var(--bg);
            text-transform: uppercase;
            letter-spacing: -0.02em;
            /* 彫り込み（Inset）効果 */
            text-shadow: 2px 2px 3px var(--dark-shadow),
                -2px -2px 3px var(--light-shadow);
            margin: 0;
            line-height: 1;
        }

        /* サブテキスト：表面に印字されたような質感 */
        .tagline {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: var(--dark-shadow);
            font-weight: 700;
        }

        /* ニューモーフィックな神経回路：背景に溶け込む溝 */
        .neural-groove {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.6;
        }

        .groove-path {
            fill: none;
            stroke: var(--dark-shadow);
            stroke-width: 2;
            stroke-linecap: round;
            filter: blur(1px);
            /* 溝の深さを出すためのブラー */
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: trace 10s ease-in-out infinite alternate;
        }

        @keyframes trace {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* 装飾的なドット：インジケーター的な要素 */
        .status-dot {
            position: absolute;
            top: 60px;
            right: 60px;
            width: 12px;
            height: 12px;
            background: var(--bg);
            border-radius: 50%;
            box-shadow: inset 2px 2px 5px var(--dark-shadow),
                inset -2px -2px 5px var(--light-shadow);
        }

        .status-dot::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 4px;
            height: 4px;
            background: #4caf50;
            /* 稼働中を示すアクセント */
            border-radius: 50%;
            box-shadow: 0 0 10px #4caf50;
        }
    </style>
</head>

<body>

    <div class="artifact-container">
        <svg class="neural-groove" viewBox="0 0 800 400">
            <path class="groove-path" d="M100,200 C150,100 300,300 400,200 S650,100 700,200" />
            <path class="groove-path" d="M200,350 Q400,150 600,350" style="animation-delay: -2s; opacity: 0.3;" />
        </svg>

        <div class="status-dot"></div>

        <h1 class="brand-engraved">Noe Shiftica</h1>
        <div class="tagline">Cognitive Architecture</div>
    </div>

</body>

</html>
